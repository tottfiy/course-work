<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Local Scanner</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>

<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-row">
        <div class="logo">LS</div>
        <div>
          <h1>Local Security Scanner</h1>
          <div class="subtitle">Run local security tools and keep results in one place.</div>
        </div>
      </div>
    </div>

    <div class="topbar-actions">
      <span class="chip chip-ghost">localhost</span>
    </div>
  </header>

  <div class="layout">
    <section class="panel tools-panel">
      <div class="panel-head">
        <h2>Tools</h2>
        <div class="toolbar">
          <button id="selectAll" class="btn btn-ghost">Select all</button>
          <button id="clearAll" class="btn btn-ghost">Clear</button>
        </div>
      </div>

      <div id="tools" class="tool-grid"></div>

      <div class="runbar">
        <button id="startBtn" class="btn btn-primary btn-xl">Run selected</button>
        <div class="statusline">
          <div id="startResult" class="status"></div>
          <div class="hint">Tip: run server as root for raw-socket tools (rkhunter/lynis)</div>
        </div>
      </div>
    </section>

    <section class="panel runs-panel">
      <div class="panel-head">
        <h2>Runs</h2>
        <div class="hint">Click a run to open its logs.</div>
      </div>
      <div id="runs" class="runs-list"></div>
    </section>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
